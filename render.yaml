services:
  # 1. Django REST API Backend
  - type: web
    name: esg-backend
    env: python
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOWED_ORIGINS
        value: "http://localhost:5173,http://127.0.0.1:5173" # The static frontend URL should also be added here after creation

  # 2. React (Vite) Frontend (Static Site)
  - type: web
    name: esg-frontend
    env: static
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    envVars:
      - key: VITE_API_URL
        value: "https://esg-backend.onrender.com/api" # Replace with your actual backend URL

databases:
  - name: esg-db
    plan: free
